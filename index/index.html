<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>控制頁</title>
  <style>
    body {
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      margin: 24px;
      background: #f5f5f5;
      color: #222;
    }

    h1 {
      margin-bottom: 8px;
    }

    .layout {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 20px;
      align-items: start;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
      margin-bottom: 16px;
    }

    .status-row {
      margin: 6px 0;
    }

    .status-label {
      display: inline-block;
      width: 120px;
      font-weight: bold;
    }

    button {
      padding: 10px 18px;
      margin-right: 8px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-start {
      background: #1f8f4d;
      color: white;
    }

    .btn-stop {
      background: #c0392b;
      color: white;
    }

    .btn-refresh {
      background: #2c3e50;
      color: white;
    }

    iframe {
      width: 100%;
      height: 520px;
      border: 1px solid #ccc;
      border-radius: 12px;
      background: black;
    }

    video {
      width: 100%;
      max-height: 320px;
      background: black;
      border-radius: 8px;
      margin-top: 8px;
    }

    .recording-item {
      border-top: 1px solid #ddd;
      padding: 12px 0;
    }

    .recording-item:first-child {
      border-top: none;
    }

    .log {
      white-space: pre-wrap;
      background: #111;
      color: #0f0;
      padding: 12px;
      border-radius: 8px;
      height: 160px;
      overflow-y: auto;
      font-family: Consolas, monospace;
      font-size: 13px;
    }

    .warning {
      color: #b45f06;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <h1> 控制頁</h1>
  <p class="warning">
    這是 Demo 測試頁：前端直接控制 Pi 5，影片列表從 Windows mock server 取得。
  </p>

  <div class="layout">
    <!-- 左側：即時串流 -->
    <div class="card">
      <h2>即時串流</h2>
      <p>MediaMTX WebRTC Viewer</p>

      <!-- 這裡用 iframe 顯示 MediaMTX 的 WebRTC 播放頁 -->
      <iframe id="streamFrame"></iframe>
    </div>

    <!-- 右側：控制與影片列表 -->
    <div>
      <div class="card">
        <h2>錄影控制</h2>

        <div class="status-row">
          <span class="status-label">Pi 5 API：</span>
          <span id="pi5ApiText"></span>
        </div>

        <div class="status-row">
          <span class="status-label">設備：</span>
          <span id="deviceId">-</span>
        </div>

        <div class="status-row">
          <span class="status-label">串流：</span>
          <span id="streamingStatus">-</span>
        </div>

        <div class="status-row">
          <span class="status-label">錄影：</span>
          <span id="recordingStatus">-</span>
        </div>

        <div class="status-row">
          <span class="status-label">Session：</span>
          <span id="sessionId">-</span>
        </div>

        <br />

        <button id="startBtn" class="btn-start" onclick="startRecording()">
          開始錄影
        </button>

        <button id="stopBtn" class="btn-stop" onclick="stopRecording()">
          停止錄影
        </button>

        <button class="btn-refresh" onclick="refreshStatus()">
          重新整理狀態
        </button>
      </div>

      <div class="card">
        <h2>已上傳影片</h2>
        <button class="btn-refresh" onclick="loadRecordings()">
          重新整理影片列表
        </button>

        <div id="recordingsList" style="margin-top: 12px;">
          尚未載入
        </div>
      </div>

      <div class="card">
        <h2>Log</h2>
        <div id="log" class="log"></div>
      </div>
    </div>
  </div>

  <script>
    // =========================
    // Demo 設定區
    // =========================
    // 這三個 IP 依照現場網路修改

    // Pi 5 control_server.py
    const PI5_API_BASE_URL = "http://192.168.0.20:7000";

    // Windows mock upload server
    const WINDOWS_API_BASE_URL = "http://192.168.1.173:8000";

    // Windows MediaMTX WebRTC 頁面
    // 如果你的 MediaMTX WebRTC 是 http://192.168.1.173:8889/arloupe
    // 就維持這樣。
    const STREAM_VIEW_URL = "http://192.168.0.20:8889/arloupe";

    // =========================
    // 初始化
    // =========================
    document.getElementById("pi5ApiText").textContent = PI5_API_BASE_URL;
    document.getElementById("streamFrame").src = STREAM_VIEW_URL;

    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");

    function log(message) {
      const logBox = document.getElementById("log");
      const now = new Date().toLocaleTimeString();
      logBox.textContent += `[${now}] ${message}\n`;
      logBox.scrollTop = logBox.scrollHeight;
    }

    function setButtons(recording, busy = false) {
      if (busy) {
        startBtn.disabled = true;
        stopBtn.disabled = true;
        return;
      }

      startBtn.disabled = recording;
      stopBtn.disabled = !recording;
    }

    // =========================
    // 查詢 Pi 5 狀態
    // =========================
    async function refreshStatus() {
      try {
        const res = await fetch(`${PI5_API_BASE_URL}/api/capture/status`);

        if (!res.ok) {
          throw new Error(await res.text());
        }

        const data = await res.json();

        document.getElementById("deviceId").textContent = data.device_id ?? "-";
        document.getElementById("streamingStatus").textContent = data.streaming ? "串流中" : "未串流";
        document.getElementById("recordingStatus").textContent = data.recording ? "錄影中" : "未錄影";
        document.getElementById("sessionId").textContent = data.session_id ?? "-";

        setButtons(data.recording);

        log(`狀態更新：recording=${data.recording}, session=${data.session_id ?? "-"}`);
      } catch (err) {
        setButtons(false);
        log(`查詢狀態失敗：${err.message}`);
        alert(`查詢 Pi 5 狀態失敗：\n${err.message}`);
      }
    }

    // =========================
    // 開始錄影
    // =========================
    async function startRecording() {
      try {
        setButtons(false, true);
        log("送出開始錄影指令...");

        const res = await fetch(`${PI5_API_BASE_URL}/api/capture/start`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            case_id: "demo_case_001",
            operator_id: "demo_user",
          }),
        });

        if (!res.ok) {
          throw new Error(await res.text());
        }

        const data = await res.json();

        log(`開始錄影成功：session=${data.session_id}`);
        await refreshStatus();
      } catch (err) {
        log(`開始錄影失敗：${err.message}`);
        alert(`開始錄影失敗：\n${err.message}`);
        await refreshStatus();
      }
    }

    // =========================
    // 停止錄影
    // =========================
    async function stopRecording() {
      try {
        setButtons(false, true);
        log("送出停止錄影指令，等待 MP4 收尾...");

        const res = await fetch(`${PI5_API_BASE_URL}/api/capture/stop`, {
          method: "POST",
        });

        if (!res.ok) {
          throw new Error(await res.text());
        }

        const data = await res.json();

        log(`停止錄影成功：session=${data.session_id}`);
        await refreshStatus();

        // uploader 可能需要幾秒才會把影片傳回 Windows
        log("等待 uploader 上傳，3 秒後重新整理影片列表...");
        setTimeout(loadRecordings, 3000);
      } catch (err) {
        log(`停止錄影失敗：${err.message}`);
        alert(`停止錄影失敗：\n${err.message}`);
        await refreshStatus();
      }
    }

    // =========================
    // 讀取 Windows 已上傳影片列表
    // =========================
    async function loadRecordings() {
      const list = document.getElementById("recordingsList");

      try {
        log("讀取影片列表...");

        const res = await fetch(`${WINDOWS_API_BASE_URL}/api/recordings`);

        if (!res.ok) {
          throw new Error(await res.text());
        }

        const data = await res.json();

        if (!data.items || data.items.length === 0) {
          list.innerHTML = "目前沒有影片";
          log("影片列表為空");
          return;
        }

        list.innerHTML = "";

        // 新的放上面
        const items = data.items.slice().reverse();

        for (const item of items) {
          const videoUrl = `${WINDOWS_API_BASE_URL}${item.video_url}`;

          const div = document.createElement("div");
          div.className = "recording-item";

          div.innerHTML = `
            <div><strong>${item.filename}</strong></div>
            <div>日期：${item.recording_date}</div>
            <div>Session：${item.session_id}</div>
            <div>大小：${formatBytes(item.size_bytes)}</div>
            <video controls src="${videoUrl}"></video>
          `;

          list.appendChild(div);
        }

        log(`影片列表載入完成，共 ${data.items.length} 筆`);
      } catch (err) {
        list.innerHTML = "讀取影片列表失敗";
        log(`讀取影片列表失敗：${err.message}`);
      }
    }

    function formatBytes(bytes) {
      if (!bytes && bytes !== 0) return "-";

      const units = ["B", "KB", "MB", "GB"];
      let value = bytes;
      let index = 0;

      while (value >= 1024 && index < units.length - 1) {
        value /= 1024;
        index++;
      }

      return `${value.toFixed(1)} ${units[index]}`;
    }

    // 頁面載入後先查一次狀態與影片列表
    refreshStatus();
    loadRecordings();

    // 每 2 秒更新一次錄影狀態
    setInterval(refreshStatus, 2000);
  </script>
</body>
</html>
